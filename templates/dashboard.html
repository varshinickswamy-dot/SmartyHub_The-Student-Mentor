<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
    min-height:100vh;
}

/* NAVBAR */
nav{
    background:#020617;
}

/* GRID LAYOUT */
.dashboard-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:35px;
    margin-top:40px;
}

/* CARD BOX */
.card-box{
    background:#0f172a;
    height:200px;
    border-radius:25px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-size:22px;
    font-weight:600;
    color:white;
    transition:0.3s ease;
    box-shadow:0 0 25px rgba(56,189,248,0.6);
}

.card-box:hover{
    transform:translateY(-10px) scale(1.02);
    box-shadow:0 0 45px rgba(56,189,248,1);
    background:#020617;
}

/* ICON */
.icon{
    font-size:50px;
    margin-bottom:12px;
}

/* LINK RESET */
a{
    text-decoration:none;
}

</style>
</head>

<body>

<nav class="navbar navbar-dark px-4">
<span class="navbar-brand fs-4">🎓 Student Guide</span>
<a href="/logout" class="btn btn-danger">Logout</a>
</nav>

<div class="container">

<h2 class="mt-4">Welcome {{current_user.name}}</h2>

<div class="dashboard-grid">

<a href="/career">
<div class="card-box">
<div class="icon">🎯</div>
Career Analyzer
</div>
</a>

<a href="/chatbot">
<div class="card-box">
<div class="icon">🤖</div>
AI Chatbot
</div>
</a>

<a href="/resume">
<div class="card-box">
<div class="icon">📄</div>
Resume Builder
</div>
</a>

<a href="/timetable">
<div class="card-box">
<div class="icon">⏱</div>
Study Timer
</div>
</a>

<a href="/admin">
<div class="card-box">
<div class="icon">🛠</div>
Admin Panel
</div>
</a>

</div>

</div>

</body>
</html>
